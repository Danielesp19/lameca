# ── CoffeeClub / La Meca — Blueprint de Render (despliegue de demo, gratis) ──
# En Render: New → Blueprint → conecta este repo. Render lee este archivo y crea
# el web service (backend Laravel vía Docker) + una base Postgres gratuita,
# inyectando las credenciales de la base automáticamente (fromDatabase).
#
# Variables marcadas con `sync: false` debes rellenarlas en el dashboard de Render
# (no se versionan por ser secretas o depender de la URL final).

databases:
  - name: coffeeclub-db
    plan: free            # gratis ~90 días; suficiente para demo. Persiste entre reinicios.
    databaseName: coffeeclub
    user: coffeeclub

services:
  - type: web
    name: coffeeclub-api
    runtime: docker
    plan: free            # gratis; se duerme tras ~15 min sin tráfico (1ª petición tarda ~40s).
    region: oregon
    dockerfilePath: menu-service/Dockerfile
    dockerContext: menu-service
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: "CoffeeClub Menu"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false        # genera con:  php artisan key:generate --show   (formato base64:...)
      - key: APP_URL
        sync: false        # la URL del propio servicio, p.ej. https://coffeeclub-api.onrender.com
      - key: LOG_CHANNEL
        value: stderr      # Render captura stdout/stderr en los logs
      - key: LOG_LEVEL
        value: warning

      # ── Base de datos (Postgres) — cableado automático desde coffeeclub-db ──
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase: { name: coffeeclub-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: coffeeclub-db, property: port }
      - key: DB_DATABASE
        fromDatabase: { name: coffeeclub-db, property: database }
      - key: DB_USERNAME
        fromDatabase: { name: coffeeclub-db, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: coffeeclub-db, property: password }

      # ── Drivers basados en base de datos (las tablas las crean las migraciones) ──
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public      # DEMO: media en disco efímero (uploads en vivo se pierden al redeploy)

      # ── App CoffeeClub ──
      - key: ADMIN_TOKEN
        sync: false        # token largo y aleatorio; DEBE coincidir con el del frontend (Vercel)
      - key: CORS_ALLOWED_ORIGINS
        sync: false        # la URL del frontend, p.ej. https://coffeeclub.vercel.app (sin barra final)
      - key: TURNSTILE_SECRET
        sync: false        # opcional (CAPTCHA); déjalo vacío para deshabilitar
      - key: TABLE_SESSION_TTL_MINUTES
        value: "15"
      - key: ORDER_TTL_MINUTES
        value: "45"
