; Límites de subida para imágenes y videos del menú.
; El default de PHP (2M por archivo / 8M por petición) provoca HTTP 422 al subir
; videos: PHP descarta el archivo antes de que Laravel lo valide.
upload_max_filesize = 128M
post_max_size = 130M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
