; Límites de subida para imágenes y videos del menú.
; El default de PHP (2M por archivo / 8M por petición) provoca HTTP 422 al subir
; videos: PHP descarta el archivo antes de que Laravel lo valide.
; Videos del menú se limitan a 15 MB en la validación de Laravel; PHP deja un poco
; más de margen para que el error sea el mensaje amable de Laravel y no un 422 seco.
upload_max_filesize = 20M
post_max_size = 22M
memory_limit = 256M
max_execution_time = 120
max_input_time = 120
